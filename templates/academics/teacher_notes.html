{% extends 'base.html' %}

{% block content %}

<h2>My Notes</h2>
<a href="{% url 'upload_notes' %}">+ upload New</a>

{% for note in notes %}
<div class="card">
    <h4>{{note.title}}</h4>
    <p>{{note.subject.name}}-{{note.classroom.name}}</p>

    {% if note.file %}
       <a href="{{note.file.url}}" target="_blank">open</a>
        <a href="{{note.file.url}}" download>Download</a>
     {% endif %}

     {% if note.video %}
      <video width="300" controls><source src="{{ note.video.url}}"></video>
    {% endif %}    
</div>
{% endfor %}
{% endblock %}
