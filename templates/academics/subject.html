
{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <!-- Heading -->
    <h2 class="section-title mb-3">Subjects</h2>

    <!-- Add Subject link -->
    <a href="{% url 'add_subject' %}" class="btn btn-primary mb-3">Add Subject</a>

    <!-- Subjects Table -->
    <div class="table-responsive">
        <table class="table table-striped table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Code</th>
                </tr>
            </thead>
            <tbody>
                {% for s in subjects %}
                <tr>
                    <td>{{ s.name }}</td>
                    <td>{{ s.code }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted">No subjects available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>
{% endblock %}
