{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="page-title">Add Assignment</h2>

    <form method="POST" class="form-card">
        {% csrf_token %}

        <label for="title">Title</label>
        <input type="text" name="title" id="title" placeholder="Enter assignment title" required>

        <label for="description">Description</label>
        <textarea name="description" id="description" placeholder="Enter description"></textarea>

        <label for="subject">Subject</label>
        <select name="subject" id="subject" required>
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
        </select>

        <label for="classroom">Classroom</label>
        <select name="classroom" id="classroom" required>
            {% for classroom in classrooms %}
                <option value="{{ classroom.id }}">{{ classroom.name }}</option>
            {% endfor %}
        </select>

        <label for="due_date">Due Date</label>
        <input type="date" name="due_date" id="due_date" required>

        <button type="submit" class="btn">Add Assignment</button>
    </form>
</div>
{% endblock %}
