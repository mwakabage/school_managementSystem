{% extends 'base.html' %}

{% block content %}
<div class="classrooms-container">

    <!-- Heading -->
    <h2 class="classrooms-title">Class Rooms</h2>

    <!-- Add Class link -->
    <a href="{% url 'add_classroom' %}" class="classrooms-btn">Add Class</a>

    <!-- Classrooms Table -->
    <div class="classrooms-table-wrapper">
        <table class="classrooms-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Stream</th>
                </tr>
            </thead>
            <tbody>
                {% for c in classes %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td>{{ c.stream }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">No classes available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>
{% endblock %}
