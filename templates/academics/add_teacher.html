{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <!-- Heading -->
    <h2 class="section-title mb-3">Assign Teacher Subject</h2>

    <!-- Form -->
    <form method="POST" class="form-card p-4 shadow-sm rounded bg-light">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Teacher</label>
            <select name="teacher" class="form-select">
                {% for t in teachers %}
                <option value="{{ t.id }}">{{ t.email }}</option>
                {% endfor %}
            </select>
        </di>
        <br><br>
        
            <label class="form-label">Subject</label>
                {% for s in subjects %}
                <input type="checkbox" name="subject" value="{{ s.id }}" >{{ s.name }}
                {% endfor %}
           <br>

            <label class="form-label">Class</label>
                {% for c in classes %}
                <input type="checkbox" name="classroom" value="{{ c.id }}">{{ c.name }} - {{ c.stream }}
                {% endfor %}
           <br>        

        <button type="submit" class="btn btn-success">Save</button>
    </form>

</div>
{% endblock %}
